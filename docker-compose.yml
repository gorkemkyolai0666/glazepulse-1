version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bindpulse
      POSTGRES_PASSWORD: bindpulse123
      POSTGRES_DB: bindpulse
    ports:
      - '5459:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bindpulse']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '4019:4019'
    environment:
      DATABASE_URL: postgresql://bindpulse:bindpulse123@postgres:5432/bindpulse?schema=public
      JWT_SECRET: bindpulse-dev-secret
      FRONTEND_URL: http://localhost:3019
      PORT: 4019
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run deploy

  frontend:
    build: ./frontend
    ports:
      - '3019:3019'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4019/api
    depends_on:
      - backend
